<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: 'DejaVu Sans Mono', 'Courier New', monospace; }
    .cursor { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  </style>

  <rect x="1" y="1" width="898" height="298" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- terminal title bar -->
  <rect x="1" y="1" width="898" height="34" rx="14" fill="#f6f8fa"/>
  <rect x="1" y="20" width="898" height="16" fill="#f6f8fa"/>
  <circle cx="26" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="18" r="6" fill="#27c93f"/>
  <text x="450" y="23" text-anchor="middle" class="mono" font-size="12" fill="#57606a">guest@dhanushkannans: ~</text>

  <!-- left panel: ascii portrait -->
  <rect x="24" y="52" width="272" height="222" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <image href="https://raw.githubusercontent.com/DHANUSHKANNANS/DHANUSHKANNANS/main/profile_ascii_light.png" x="30" y="58" width="260" height="210" preserveAspectRatio="xMidYMid meet"/>

  <!-- right panel: typed terminal lines -->
  <text x="330" y="82" class="mono" font-size="13" fill="#57606a">$ whoami</text>
  <text x="330" y="108" class="mono" font-size="22" font-weight="bold" fill="#0969da">
    Dhanush Kannan S<tspan class="cursor">_</tspan>
  </text>

  <text x="330" y="138" class="mono" font-size="13" fill="#57606a">$ cat role.txt</text>
  <text x="330" y="163" class="mono" font-size="15" fill="#24292f">Robotics &amp; Automation Engineering Student</text>

  <line x1="330" y1="185" x2="860" y2="185" stroke="#d0d7de" stroke-width="1"/>

  <text x="330" y="210" class="mono" font-size="13" fill="#57606a">$ tail -f currently_building.log</text>

    <text x="330" y="248" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#1a7f37">
      <tspan>&gt; building a humanoid robot physics sim in PyBullet</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.12;0.85;1"
        dur="9.600000000000001s" begin="0.0s" repeatCount="indefinite" fill="freeze"/>
    </text>
    <text x="330" y="248" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#1a7f37">
      <tspan>&gt; training walk cycles with stable-baselines3 (RL)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.12;0.85;1"
        dur="9.600000000000001s" begin="3.2s" repeatCount="indefinite" fill="freeze"/>
    </text>
    <text x="330" y="248" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#1a7f37">
      <tspan>&gt; reconstructed satellite imagery for ISRO's hackathon</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.12;0.85;1"
        dur="9.600000000000001s" begin="6.4s" repeatCount="indefinite" fill="freeze"/>
    </text>
</svg>